<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dashboard Asociativo</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script type="module" src="firebase-init.js"></script>
</head>
<body>

<!-- LOADING -->
<div id="screen-loading" class="hidden">
  <div class="spinner"></div>
  <div class="load-text">Cargando ...</div>
</div>

<!-- APP -->
<div id="screen-app" class="hidden">

  <div class="main-area">
    <div class="main-content" id="main-content"></div>
  </div>

  <!-- BOTTOM NAV FLOTANTE -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="bn-item active" id="nav-home" onclick="navTo('home')" title="Inicio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a2 2 0 0 1-2 2h-4v-7h-6v7H5a2 2 0 0 1-2-2V9.5z"/></svg></button>
    <button class="bn-item" id="nav-asociaciones" onclick="navTo('asociaciones')" title="Asociaciones"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></button>
    <button class="bn-item" id="nav-diagnosticos" onclick="navTo('diagnosticos')" title="Diagnósticos"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M9 13l2 2 4-4"/></svg></button>
    <button class="bn-item" id="nav-encuentros" onclick="navTo('encuentros')" title="Encuentros"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></button>
  </nav>

  <!-- FILTER DRAWER (compartido) -->
  <aside class="filter-drawer" id="filter-drawer">
    <div class="filter-drawer-head">
      <div class="filter-drawer-title">Filtros de búsqueda</div>
      <button class="modal-close" onclick="closeFilterDrawer()" title="Cerrar"></button>
    </div>
    <div class="filter-drawer-body" id="filter-drawer-body"></div>
    <div class="filter-drawer-foot">
      <button class="btn btn-glass" onclick="clearFilters()">Limpiar</button>
      <button class="btn btn-primary" onclick="applyFilters()">Aplicar</button>
    </div>
  </aside>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Scripts -->
<script src="icons.js"></script>
<script src="app.js"></script>
<script src="home.js"></script>
<script src="asociaciones.js"></script>
<script src="diagnosticos.js"></script>
<script src="encuentros.js"></script>

</body>
</html>
