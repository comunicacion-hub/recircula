<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dashboard Social — ReCircula</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script type="module" src="firebase-init.js"></script>
</head>
<body>

<!-- LOADING -->
<div id="screen-loading" class="hidden">
  <div class="spinner"></div>
  <div class="load-text">Cargando Dashboard Social...</div>
</div>

<!-- APP -->
<div id="screen-app" class="hidden">

  <div class="main-area">
    <div class="main-content" id="main-content"></div>
  </div>

  <!-- BOTTOM NAV FLOTANTE -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="bn-item active" id="nav-home" onclick="navTo('home')" title="Inicio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a2 2 0 0 1-2 2h-4v-7h-6v7H5a2 2 0 0 1-2-2V9.5z"/></svg></button>
    <button class="bn-item" id="nav-recicladores" onclick="navTo('recicladores')" title="Recicladores"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></button>
    <button class="bn-item" id="nav-alianzas" onclick="navTo('alianzas')" title="Alianzas"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m11 17 2 2a1 1 0 1 0 3-3"/><path d="m14 14 2.5 2.5a1 1 0 1 0 3-3l-3.88-3.88a3 3 0 0 0-4.24 0l-.88.88a1 1 0 1 1-3-3l2.81-2.81a5.79 5.79 0 0 1 7.06-.87l.47.28a2 2 0 0 0 1.42.25L21 4"/><path d="m21 3 1 11h-2"/><path d="M3 3 2 14l6.5 6.5a1 1 0 1 0 3-3"/><path d="M3 4h8"/></svg></button>
    <button class="bn-item" id="nav-financiero" onclick="navTo('financiero')" title="Financiero"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 7V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/><path d="M21 12a2 2 0 0 0-2-2h-4a2 2 0 0 0 0 4h4a2 2 0 0 0 2-2Z"/></svg></button>
  </nav>

  <!-- FILTER DRAWER (compartido) -->
  <aside class="filter-drawer" id="filter-drawer">
    <div class="filter-drawer-head">
      <div class="filter-drawer-title">Filtros de búsqueda</div>
      <button class="modal-close" onclick="closeFilterDrawer()" title="Cerrar"></button>
    </div>
    <div class="filter-drawer-body" id="filter-drawer-body"></div>
    <div class="filter-drawer-foot">
      <button class="btn btn-glass" onclick="clearFilters()">Limpiar</button>
      <button class="btn btn-primary" onclick="applyFilters()">Aplicar</button>
    </div>
  </aside>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Scripts -->
<script src="icons.js"></script>
<script src="app.js"></script>
<script src="home.js"></script>
<script src="recicladores.js"></script>
<script src="alianzas.js"></script>
<script src="financiero.js"></script>

</body>
</html>
