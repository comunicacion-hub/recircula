<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReCircula 360 - Redes Con Rostro</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUmVDaXJjdWxhIDM2MCIsInNob3J0X25hbWUiOiJSZUNpcmN1bGEiLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiI2U4ZjRmZCIsInRoZW1lX2NvbG9yIjoiIzMzQThERSJ9">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
:root {
  --b1: #33A8DE;
  --b2: #506CFF;
  --g1: #18AE97;
  --g2: #0BC3FF;
  --c1: #FF751F;
  --c2: #FF376F;
  --d1: #F5AD21;
  --d2: #9FDA60;
  --tx: #333333;
  --tm: #6B6B80;
  --tl: #A0A0B0;
  --bg: linear-gradient(135deg, #e8f4fd, #eef0ff, #e8faf7);
  --surface: #ffffff;
  --border: rgba(0,0,0,0.09);
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Outfit', sans-serif;
  color: var(--tx);
  background: var(--bg);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.hidden { display: none !important; }

.grad-text {
  background: linear-gradient(90deg, var(--b1), var(--b2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── Offline Banner ──────────────────────────────────────── */
#offline-banner {
  position: fixed;
  top: 0; left: 0; right: 0;
  background: #c91a44;
  color: #fff;
  text-align: center;
  padding: 8px 16px;
  font-size: 12.5px;
  font-weight: 600;
  z-index: 10000;
  transform: translateY(-100%);
  transition: transform 0.3s;
}
#offline-banner.show { transform: translateY(0); }

/* ── Spinner ─────────────────────────────────────────────── */
.spinner {
  width: 36px; height: 36px;
  border: 3px solid #e4f4fb;
  border-top-color: var(--b1);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ───────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--tx);
  color: #fff;
  padding: 11px 22px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  z-index: 9999;
  transition: transform 0.3s;
  white-space: nowrap;
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── LOGIN ───────────────────────────────────────────────── */
#screen-login {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
}

.login-card {
  background: #fff;
  border-radius: var(--radius-xl);
  border: 1px solid var(--border);
  padding: 52px 48px;
  width: 100%;
  max-width: 420px;
  text-align: center;
  box-shadow: 0 8px 40px rgba(0,0,0,0.08);
}

.login-logo {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 4px;
}

.login-brand {
  font-size: 13px;
  color: var(--tl);
  margin-bottom: 36px;
  font-weight: 400;
}

.login-google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  padding: 13px 20px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: #fff;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--tx);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.login-google-btn:hover { background: #f8fbfd; border-color: var(--b1); }
.login-google-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.login-google-icon { width: 20px; height: 20px; }
.login-domain-note { margin-top: 16px; font-size: 11.5px; color: var(--tl); }

/* ── LOADING ─────────────────────────────────────────────── */
#screen-loading {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.load-text { font-size: 14px; color: var(--tm); font-weight: 500; }

/* ── HUB ─────────────────────────────────────────────────── */
#screen-hub {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
.hub-header {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.hub-logo { font-size: 18px; font-weight: 800; }
.hub-subt { font-size: 11px; color: var(--tl); margin-top: 2px; }

.hub-user {
  display: flex;
  align-items: center;
  gap: 12px;
}

.hub-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--b1), var(--b2));
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  flex-shrink: 0;
}

.hub-username { font-size: 13px; font-weight: 600; color: var(--tx); }
.hub-role    { font-size: 11px; color: var(--tm); }

.btn-logout {
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: #fff;
  color: var(--tm);
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.btn-logout:hover { background: #fff0f3; color: #c91a44; border-color: #f5c0cc; }

/* Main content */
.hub-main {
  flex: 1;
  padding: 40px 32px;
  max-width: 1000px;
  margin: 0 auto;
  width: 100%;
}

.hub-bienvenido {
  font-size: 26px;
  font-weight: 700;
  color: var(--tx);
  margin-bottom: 8px;
}

.hub-desc {
  font-size: 14px;
  color: var(--tm);
  margin-bottom: 40px;
}

/* Módulos grid */
.modulos-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.modulos-titulo {
  font-size: 13px;
  font-weight: 700;
  color: var(--tl);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.btn-config {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: #fff;
  color: var(--tm);
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-config:hover { border-color: var(--b1); color: var(--b1); }

.modulos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}

.modulo-card {
  background: #fff;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: 28px 24px;
  cursor: pointer;
  transition: box-shadow 0.2s, transform 0.15s;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: relative;
}

.modulo-card:hover {
  box-shadow: 0 6px 24px rgba(0,0,0,0.1);
  transform: translateY(-3px);
}

.modulo-card.inactivo {
  opacity: 0.5;
  cursor: not-allowed;
  pointer-events: none;
}

.modulo-card.inactivo-admin {
  opacity: 0.7;
  border-style: dashed;
}

.modulo-emoji { font-size: 36px; }

.modulo-nombre {
  font-size: 15px;
  font-weight: 700;
  color: var(--tx);
}

.modulo-desc {
  font-size: 12px;
  color: var(--tm);
  line-height: 1.5;
}

.modulo-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 10.5px;
  font-weight: 600;
  background: #f0f4f8;
  color: var(--tl);
  align-self: flex-start;
}

.modulo-badge.activo {
  background: linear-gradient(135deg, var(--b1), var(--b2));
  color: #fff;
}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal {
  background: #fff;
  border-radius: var(--radius-xl);
  width: 100%;
  max-width: 540px;
  max-height: 90vh;
  overflow-y: auto;
  scroll-behavior: smooth;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}

.modal-head {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: #fff;
  z-index: 1;
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
}

.modal-title { font-size: 16px; font-weight: 700; color: var(--tx); }

.modal-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  background: #f0f4f8;
  color: var(--tm);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.modal-close:hover { background: #ffe4e9; color: #c91a44; }

.modal-body { padding: 20px 24px; }
.modal-foot {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* Forms */
.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--tm);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.form-input, .form-select {
  width: 100%;
  padding: 10px 13px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-family: 'Outfit', sans-serif;
  font-size: 13.5px;
  color: var(--tx);
  background: #fff;
  transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus { outline: none; border-color: var(--b1); }
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all 0.15s;
}
.btn-primary { background: #fff; border-color: var(--b1); color: var(--b1); }
.btn-primary:hover { background: #f0f7ff; }
.btn-glass   { background: #fff; border-color: #cdd5dd; color: var(--tm); }
.btn-glass:hover { background: #f8fbfd; }
.btn-danger  { background: #fff; border-color: #c91a44; color: #c91a44; }
.btn-sm { padding: 6px 13px; font-size: 12px; }

/* Tabs */
.tabs-bar { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.tab-btn {
  padding: 9px 20px;
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  font-size: 13px;
  font-weight: 600;
  color: var(--tm);
  cursor: pointer;
  border: 1px solid transparent;
  border-bottom: none;
  background: transparent;
  font-family: 'Outfit', sans-serif;
  transition: all 0.15s;
}
.tab-btn.active { background: #fff; color: var(--tx); border-color: var(--border); margin-bottom: -1px; }

/* Table */
.table-wrap { overflow-x: auto; border-radius: var(--radius-lg); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  background: #f4f8fb;
  padding: 11px 14px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  color: var(--tm);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-bottom: 1px solid var(--border);
}
tbody td { padding: 11px 14px; border-bottom: 1px solid #f0f4f8; color: var(--tx); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #f8fbfd; }
.td-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.15s; }
tbody tr:hover .td-actions { opacity: 1; }

.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.badge-blue  { background: #e8f4fd; color: var(--b1); }
.badge-green { background: #e4fbf4; color: #0f6e56; }
.badge-warn  { background: #fff8e4; color: #854f0b; }

/* Responsive */
@media (max-width: 768px) {
  .modulos-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
}

@media (max-width: 600px) {
  .hub-main { padding: 24px 16px; }
  .hub-header { padding: 14px 16px; flex-wrap: wrap; gap: 10px; }
  .modulos-grid { grid-template-columns: 1fr; }
  .hub-bienvenido { font-size: 20px; }
  .td-actions { opacity: 1; }
  .form-grid-2 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Offline Banner -->
<div id="offline-banner">
  <i class="ti ti-wifi-off"></i> Sin conexion — Mostrando datos en cache
</div>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-logo grad-text">ReCircula 360</div>
    <div class="login-brand">Una app de Redes Con Rostro</div>
    <button class="login-google-btn" id="btn-login" onclick="iniciarLogin()">
      <svg class="login-google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continuar con Google
    </button>
    <p class="login-domain-note">Solo cuentas @redesconrostro.org</p>
  </div>
</div>

<!-- LOADING -->
<div id="screen-loading" class="hidden">
  <div class="spinner"></div>
  <div class="load-text">Cargando ReCircula 360...</div>
</div>

<!-- HUB -->
<div id="screen-hub" class="hidden">
  <div class="hub-header">
    <div>
      <div class="hub-logo grad-text">ReCircula 360</div>
      <div class="hub-subt">Redes Con Rostro</div>
    </div>
    <div class="hub-user">
      <div class="hub-avatar" id="hub-avatar">?</div>
      <div>
        <div class="hub-username" id="hub-username">—</div>
        <div class="hub-role" id="hub-role">—</div>
      </div>
      <button class="btn-logout" onclick="cerrarSesion()">
        <i class="ti ti-logout"></i> Salir
      </button>
    </div>
  </div>

  <div class="hub-main">
    <div class="hub-bienvenido" id="hub-bienvenido">Bienvenido</div>
    <div class="hub-desc">Selecciona un modulo para continuar</div>

    <div class="modulos-header">
      <div class="modulos-titulo">Modulos disponibles</div>
      <button class="btn-config hidden" id="btn-config" onclick="abrirConfiguracion()">
        <i class="ti ti-settings"></i> Configuracion
      </button>
    </div>

    <div class="modulos-grid" id="modulos-grid">
      <div style="color:var(--tl);font-size:13px">Cargando modulos...</div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
(function() {
  'use strict';

  const SCRIPT_URL  = 'https://script.google.com/macros/s/AKfycbyy_lNvMjFiJvUkwPhLXZsIlHJ_2vzDGmSV1TGOvBZVsgP3cndSJPwwYzwcLdgUSw4GCw/exec';
  const G_CLIENT_ID = '783730193199-d7nhahv3ou4rmps7nrpoop5cpor079ej.apps.googleusercontent.com';
  const DOMAIN      = 'redesconrostro.org';
  const TOKEN_MARGIN_MS = 5 * 60 * 1000;

  let session      = null;
  let accessToken  = null;
  let tokenExpiry  = 0;
  let hubData      = null;
  let isOnline     = navigator.onLine;

  function esc(str) {
    if (str === null || str === undefined) return '';
    const div = document.createElement('div');
    div.textContent = String(str);
    return div.innerHTML;
  }

  function isValidUrl(str) {
    try {
      const u = new URL(str);
      return u.protocol === 'http:' || u.protocol === 'https:';
    } catch { return false; }
  }

  function updateOnlineStatus() {
    isOnline = navigator.onLine;
    const banner = document.getElementById('offline-banner');
    if (!isOnline) {
      banner.classList.add('show');
    } else {
      banner.classList.remove('show');
    }
  }

  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  updateOnlineStatus();

  function cacheData(data) {
    try {
      localStorage.setItem('rcr_hub_data', JSON.stringify(data));
      localStorage.setItem('rcr_hub_cache_time', String(Date.now()));
    } catch(e) { console.warn('Cache write failed', e); }
  }

  function getCachedData() {
    try {
      const raw = localStorage.getItem('rcr_hub_data');
      if (raw) return JSON.parse(raw);
    } catch(e) { console.warn('Cache read failed', e); }
    return null;
  }

  function iniciarLogin() {
    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    try {
      const client = google.accounts.oauth2.initTokenClient({
        client_id: G_CLIENT_ID,
        scope: 'email profile https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/spreadsheets.readonly',
        callback: async (resp) => {
          btn.disabled = false;
          if (resp.error) { showToast('Error al iniciar sesion'); return; }
          accessToken = resp.access_token;
          tokenExpiry = Date.now() + (resp.expires_in - 60) * 1000;
          await verificarUsuario();
        },
      });
      client.requestAccessToken();
    } catch(e) {
      btn.disabled = false;
      showToast('Error al cargar Google Sign-In');
    }
  }

  async function verificarUsuario() {
    mostrarLoading();
    try {
      const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
        headers: { Authorization: 'Bearer ' + accessToken }
      });
      if (!res.ok) throw new Error('userinfo failed');
      const info = await res.json();

      if (!info.email || !info.email.endsWith('@' + DOMAIN)) {
        showToast('Solo cuentas @' + DOMAIN);
        mostrarLogin();
        return;
      }

      const data = await apiGet({ action: 'getDatos', email: info.email });
      if (!data.ok) {
        showToast('Usuario no autorizado. Contacta al administrador.');
        mostrarLogin();
        return;
      }

      session = {
        nombre: data.data.usuario.nombre || info.given_name || 'Usuario',
        email:  info.email,
        rol:    data.data.usuario.rol || 'Visualizador',
      };
      hubData = data.data;

      cacheData(hubData);

      sessionStorage.setItem('rcr_hub_session', JSON.stringify(session));
      sessionStorage.setItem('rcr_hub_token',   accessToken);
      sessionStorage.setItem('rcr_hub_exp',     String(tokenExpiry));

      iniciarHub();
    } catch(e) {
      console.error('verificarUsuario:', e);
      const cached = getCachedData();
      const savedSession = sessionStorage.getItem('rcr_hub_session');
      if (cached && savedSession) {
        session = JSON.parse(savedSession);
        hubData = cached;
        showToast('Modo sin conexion — datos en cache');
        iniciarHub();
        return;
      }
      showToast('Error de conexion');
      mostrarLogin();
    }
  }

  function recuperarSesion() {
    const s   = sessionStorage.getItem('rcr_hub_session');
    const t   = sessionStorage.getItem('rcr_hub_token');
    const exp = sessionStorage.getItem('rcr_hub_exp');
    if (s && t && exp && Date.now() < parseInt(exp) - TOKEN_MARGIN_MS) {
      session      = JSON.parse(s);
      accessToken  = t;
      tokenExpiry  = parseInt(exp);
      return true;
    }
    return false;
  }

  function cerrarSesion() {
    sessionStorage.clear();
    try { localStorage.removeItem('rcr_hub_data'); localStorage.removeItem('rcr_hub_cache_time'); } catch(e) {}
    session = null; accessToken = null; hubData = null;
    mostrarLogin();
    try { google.accounts.id.disableAutoSelect(); } catch(e) {}
  }

  function iniciarHub() {
    if (!session || !session.nombre) {
      mostrarLogin();
      return;
    }

    const nombre = session.nombre;
    const partes = nombre.trim().split(/\s+/).filter(Boolean);
    const iniciales = partes.length >= 2
      ? (partes[0][0] + partes[partes.length - 1][0]).toUpperCase()
      : nombre.substring(0, 2).toUpperCase();

    document.getElementById('hub-avatar').textContent   = iniciales;
    document.getElementById('hub-username').textContent = nombre;
    document.getElementById('hub-role').textContent     = session.rol;
    document.getElementById('hub-bienvenido').textContent = 'Bienvenido, ' + partes[0];

    if (session.rol === 'Admin') {
      document.getElementById('btn-config').classList.remove('hidden');
    }

    renderModulos(hubData.modulos);
    mostrarHub();
  }

  function renderModulos(modulos) {
    const grid = document.getElementById('modulos-grid');
    if (!modulos || !modulos.length) {
      grid.innerHTML = '<p style="color:var(--tl);font-size:13px">No hay modulos disponibles</p>';
      return;
    }

    grid.innerHTML = modulos.map(function(m) {
      var activo   = m['Activo'] === true || m['Activo'] === 'TRUE';
      var tieneURL = m['URL'] && m['URL'].toString().trim() !== '';
      var idMod    = m['ID_Modulo'] || '';
      var url      = m['URL'] || '';
      var clases   = activo && tieneURL ? '' : (session.rol === 'Admin' ? 'inactivo-admin' : 'inactivo');
      var onclick  = activo && tieneURL ? "App.abrirModulo('" + url.replace(/'/g, "\\'") + "')"
                       : session.rol === 'Admin' ? "App.editarModulo('" + idMod.replace(/'/g, "\\'") + "')"
                       : '';

      return '<div class="modulo-card ' + clases + '" onclick="' + onclick + '">' +
        '<div class="modulo-emoji">' + esc(m['Emoji'] || '\uD83D\uDCE6') + '</div>' +
        '<div>' +
          '<div class="modulo-nombre">' + esc(m['Nombre']) + '</div>' +
          '<div class="modulo-desc" style="margin-top:4px">' + esc(m['Descripcion'] || '') + '</div>' +
        '</div>' +
        '<span class="modulo-badge ' + (activo ? 'activo' : '') + '">' +
          (activo ? 'Disponible' : 'Proximamente') +
        '</span>' +
        (session.rol === 'Admin'
          ? '<button onclick="event.stopPropagation();App.editarModulo(\'' + idMod.replace(/'/g, "\\'") + '\')" style="position:absolute;top:12px;right:12px;border:none;background:none;cursor:pointer;color:var(--tl);font-size:16px"><i class="ti ti-pencil"></i></button>'
          : '') +
      '</div>';
    }).join('');
  }

  function abrirModulo(url) {
    if (!isValidUrl(url)) {
      showToast('URL invalida');
      return;
    }
    sessionStorage.setItem('rcr_session',   JSON.stringify(session));
    sessionStorage.setItem('rcr_token',     accessToken);
    sessionStorage.setItem('rcr_token_exp', String(tokenExpiry));
    window.location.href = url;
  }

  var CONFIG_TAB = 'modulos';

  function abrirConfiguracion() {
    abrirModal(
      '<div class="modal" style="max-width:660px">' +
        '<div class="modal-head">' +
          '<div class="modal-title"><i class="ti ti-settings"></i> Configuracion</div>' +
          '<button class="modal-close" onclick="App.cerrarModal()"><i class="ti ti-x"></i></button>' +
        '</div>' +
        '<div class="modal-body">' +
          '<div class="tabs-bar">' +
            '<button class="tab-btn active" id="cfg-tab-modulos" onclick="App.switchCfgTab(\'modulos\')"><i class="ti ti-layout-grid"></i> Modulos</button>' +
            '<button class="tab-btn" id="cfg-tab-usuarios" onclick="App.switchCfgTab(\'usuarios\')"><i class="ti ti-users"></i> Usuarios</button>' +
          '</div>' +
          '<div id="cfg-content"></div>' +
        '</div>' +
      '</div>'
    );
    switchCfgTab('modulos');
  }

  function switchCfgTab(tab) {
    CONFIG_TAB = tab;
    document.querySelectorAll('[id^="cfg-tab-"]').forEach(function(el) { el.classList.remove('active'); });
    var tabEl = document.getElementById('cfg-tab-' + tab);
    if (tabEl) tabEl.classList.add('active');
    if (tab === 'modulos')  renderCfgModulos();
    if (tab === 'usuarios') renderCfgUsuarios();
  }

  function isActivo(val) { return val === true || val === 'TRUE'; }

  function renderCfgModulos() {
    var modulos = hubData.modulos || [];
    var filas = modulos.map(function(m) {
      var a = isActivo(m['Activo']);
      return '<tr>' +
        '<td>' + esc(m['Emoji'] || '\u2014') + '</td>' +
        '<td style="font-weight:500">' + esc(m['Nombre']) + '</td>' +
        '<td style="font-size:12px;color:var(--tm);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + esc(m['URL'] || '') + '">' + esc(m['URL'] || '\u2014') + '</td>' +
        '<td><span class="badge ' + (a ? 'badge-green' : 'badge-warn') + '">' + (a ? 'Activo' : 'Inactivo') + '</span></td>' +
        '<td><div class="td-actions">' +
          '<button class="btn btn-glass btn-sm" onclick="App.editarModulo(\'' + (m['ID_Modulo'] || '').replace(/'/g, "\\'") + '\')"><i class="ti ti-pencil"></i></button>' +
        '</div></td>' +
      '</tr>';
    }).join('');

    document.getElementById('cfg-content').innerHTML =
      '<div class="table-wrap">' +
        '<table>' +
          '<thead><tr><th>Emoji</th><th>Nombre</th><th>URL</th><th>Estado</th><th></th></tr></thead>' +
          '<tbody>' + (filas || '<tr><td colspan="5" style="text-align:center;color:var(--tl);padding:20px">Sin modulos</td></tr>') + '</tbody>' +
        '</table>' +
      '</div>';
  }

  function editarModulo(id) {
    var m = (hubData.modulos || []).find(function(x) { return x['ID_Modulo'] === id; });
    if (!m) return;

    var a = isActivo(m['Activo']);
    var contenido =
      '<div style="padding:16px 0">' +
        '<div class="form-group">' +
          '<label class="form-label">Nombre</label>' +
          '<input type="text" class="form-input" id="mod-nombre" value="' + esc(m['Nombre'] || '') + '" readonly style="background:#f8fbfd;color:var(--tm)">' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">URL *</label>' +
          '<input type="url" class="form-input" id="mod-url" placeholder="https://..." value="' + esc(m['URL'] || '') + '">' +
        '</div>' +
        '<div class="form-grid-2">' +
          '<div class="form-group">' +
            '<label class="form-label">Emoji</label>' +
            '<input type="text" class="form-input" id="mod-emoji" value="' + esc(m['Emoji'] || '') + '" maxlength="4">' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Activo</label>' +
            '<select class="form-select" id="mod-activo">' +
              '<option value="TRUE"' + (a ? ' selected' : '') + '>Si</option>' +
              '<option value="FALSE"' + (!a ? ' selected' : '') + '>No</option>' +
            '</select>' +
          '</div>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Descripcion</label>' +
          '<input type="text" class="form-input" id="mod-desc" value="' + esc(m['Descripcion'] || '') + '">' +
        '</div>' +
        '<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:8px">' +
          '<button class="btn btn-glass" onclick="App.switchCfgTab(\'modulos\')">Cancelar</button>' +
          '<button class="btn btn-primary" onclick="App.guardarModulo(\'' + id.replace(/'/g, "\\'") + '\')"><i class="ti ti-check"></i> Guardar</button>' +
        '</div>' +
      '</div>';

    document.getElementById('cfg-content').innerHTML = contenido;
  }

  async function guardarModulo(id) {
    var urlEl    = document.getElementById('mod-url');
    var emojiEl  = document.getElementById('mod-emoji');
    var activoEl = document.getElementById('mod-activo');
    var descEl   = document.getElementById('mod-desc');
    if (!urlEl || !emojiEl || !activoEl || !descEl) { showToast('Error en el formulario'); return; }

    var url    = urlEl.value.trim();
    var emoji  = emojiEl.value.trim();
    var activo = activoEl.value === 'TRUE';
    var desc   = descEl.value.trim();

    if (url && !isValidUrl(url)) { showToast('URL invalida'); return; }

    try {
      var m = (hubData.modulos || []).find(function(x) { return x['ID_Modulo'] === id; });
      var res = await apiPost({ action: 'saveModulo', data: {
        ID_Modulo: id, Nombre: m ? m['Nombre'] : '', URL: url,
        Emoji: emoji, Activo: activo, Descripcion: desc,
      }});
      if (!res.ok) { showToast('Error al guardar'); return; }

      var idx = hubData.modulos.findIndex(function(x) { return x['ID_Modulo'] === id; });
      if (idx >= 0) {
        hubData.modulos[idx] = Object.assign({}, hubData.modulos[idx], { URL: url, Emoji: emoji, Activo: activo, Descripcion: desc });
      }

      cacheData(hubData);
      showToast('Modulo actualizado');
      renderModulos(hubData.modulos);
      switchCfgTab('modulos');
    } catch(e) {
      console.error('guardarModulo:', e);
      showToast('Error de conexion');
    }
  }

  function renderCfgUsuarios() {
    var usuarios = hubData.usuarios || [];
    var filas = usuarios.map(function(u) {
      var rolClass = u['Rol'] === 'Admin' ? 'badge-blue' : u['Rol'] === 'Editor' ? 'badge-green' : 'badge-warn';
      var a = isActivo(u['Activo']);
      return '<tr>' +
        '<td style="font-weight:500">' + esc(u['Nombre']) + '</td>' +
        '<td style="font-size:12px;color:var(--tm)">' + esc(u['Email']) + '</td>' +
        '<td><span class="badge ' + rolClass + '">' + esc(u['Rol']) + '</span></td>' +
        '<td><span class="badge ' + (a ? 'badge-green' : 'badge-warn') + '">' + (a ? 'Activo' : 'Inactivo') + '</span></td>' +
        '<td><div class="td-actions">' +
          '<button class="btn btn-glass btn-sm" onclick="App.editarUsuario(\'' + (u['ID_Usuario'] || '').replace(/'/g, "\\'") + '\')"><i class="ti ti-pencil"></i></button>' +
        '</div></td>' +
      '</tr>';
    }).join('');

    document.getElementById('cfg-content').innerHTML =
      '<div style="display:flex;justify-content:flex-end;margin-bottom:12px">' +
        '<button class="btn btn-primary btn-sm" onclick="App.nuevoUsuario()"><i class="ti ti-plus"></i> Nuevo usuario</button>' +
      '</div>' +
      '<div class="table-wrap">' +
        '<table>' +
          '<thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Activo</th><th></th></tr></thead>' +
          '<tbody>' + (filas || '<tr><td colspan="5" style="text-align:center;color:var(--tl);padding:20px">Sin usuarios</td></tr>') + '</tbody>' +
        '</table>' +
      '</div>';
  }

  function nuevoUsuario() { editarUsuario(null); }

  function editarUsuario(id) {
    var u = id ? (hubData.usuarios || []).find(function(x) { return x['ID_Usuario'] === id; }) : null;

    var form =
      '<div style="padding:16px 0">' +
        '<div class="form-group">' +
          '<label class="form-label">Nombre *</label>' +
          '<input type="text" class="form-input" id="usr-nombre" value="' + esc(u ? u['Nombre'] : '') + '">' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Email *</label>' +
          '<input type="email" class="form-input" id="usr-email" value="' + esc(u ? u['Email'] : '') + '" placeholder="nombre@redesconrostro.org"' + (u ? ' readonly style="background:#f8fbfd;color:var(--tm)"' : '') + '>' +
        '</div>' +
        '<div class="form-grid-2">' +
          '<div class="form-group">' +
            '<label class="form-label">Rol</label>' +
            '<select class="form-select" id="usr-rol">' +
              '<option value="Admin"' + (u && u['Rol'] === 'Admin' ? ' selected' : '') + '>Admin</option>' +
              '<option value="Editor"' + (u && u['Rol'] === 'Editor' ? ' selected' : '') + '>Editor</option>' +
              '<option value="Visualizador"' + (u && u['Rol'] === 'Visualizador' ? ' selected' : '') + '>Visualizador</option>' +
            '</select>' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Activo</label>' +
            '<select class="form-select" id="usr-activo">' +
              '<option value="true"' + (!u || u['Activo'] !== false ? ' selected' : '') + '>Si</option>' +
              '<option value="false"' + (u && u['Activo'] === false ? ' selected' : '') + '>No</option>' +
            '</select>' +
          '</div>' +
        '</div>' +
        '<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:8px">' +
          '<button class="btn btn-glass" onclick="App.switchCfgTab(\'usuarios\')">Cancelar</button>' +
          '<button class="btn btn-primary" onclick="App.guardarUsuario(\'' + (id || '') + '\')"><i class="ti ti-check"></i> ' + (u ? 'Actualizar' : 'Guardar') + '</button>' +
        '</div>' +
      '</div>';

    document.getElementById('cfg-content').innerHTML = form;
  }

  async function guardarUsuario(id) {
    var nombreEl = document.getElementById('usr-nombre');
    var emailEl  = document.getElementById('usr-email');
    var rolEl    = document.getElementById('usr-rol');
    var activoEl = document.getElementById('usr-activo');
    if (!nombreEl || !emailEl || !rolEl || !activoEl) { showToast('Error en el formulario'); return; }

    var nombre = nombreEl.value.trim();
    var email  = emailEl.value.trim();
    var rol    = rolEl.value;
    var activo = activoEl.value === 'true';

    if (!nombre || !email) { showToast('Nombre y email son obligatorios'); return; }
    if (!email.endsWith('@' + DOMAIN)) { showToast('Solo cuentas @' + DOMAIN); return; }

    try {
      var res = await apiPost({ action: 'saveUsuario', data: {
        ID_Usuario: id || '', Nombre: nombre, Email: email, Rol: rol, Activo: activo,
      }});
      if (!res.ok) { showToast('Error al guardar'); return; }

      if (id) {
        var idx = hubData.usuarios.findIndex(function(x) { return x['ID_Usuario'] === id; });
        if (idx >= 0) hubData.usuarios[idx] = Object.assign({}, hubData.usuarios[idx], { Nombre: nombre, Rol: rol, Activo: activo });
      } else {
        hubData.usuarios.push({ ID_Usuario: res.id, Nombre: nombre, Email: email, Rol: rol, Activo: activo });
      }

      cacheData(hubData);
      showToast(id ? 'Usuario actualizado' : 'Usuario creado');
      switchCfgTab('usuarios');
    } catch(e) {
      console.error('guardarUsuario:', e);
      showToast('Error de conexion');
    }
  }

  async function apiGet(params) {
    var qs  = new URLSearchParams(params).toString();
    var res = await fetch(SCRIPT_URL + '?' + qs);
    if (!res.ok) throw new Error('apiGet failed: ' + res.status);
    return res.json();
  }

  async function apiPost(body) {
    var res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(body) });
    if (!res.ok) throw new Error('apiPost failed: ' + res.status);
    return res.json();
  }

  function mostrarLogin() {
    document.getElementById('screen-login').classList.remove('hidden');
    document.getElementById('screen-loading').classList.add('hidden');
    document.getElementById('screen-hub').classList.add('hidden');
  }
  function mostrarLoading() {
    document.getElementById('screen-login').classList.add('hidden');
    document.getElementById('screen-loading').classList.remove('hidden');
    document.getElementById('screen-hub').classList.add('hidden');
  }
  function mostrarHub() {
    document.getElementById('screen-login').classList.add('hidden');
    document.getElementById('screen-loading').classList.add('hidden');
    document.getElementById('screen-hub').classList.remove('hidden');
  }

  function showToast(msg, dur) {
    dur = dur || 3500;
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, dur);
  }

  function abrirModal(html) {
    cerrarModal();
    var overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'modal-overlay';
    overlay.innerHTML = html;
    overlay.addEventListener('click', function(e) { if (e.target === overlay) cerrarModal(); });
    document.body.appendChild(overlay);
  }

  function cerrarModal() {
    var m = document.getElementById('modal-overlay');
    if (m) m.remove();
  }

  window.App = {
    abrirModulo: abrirModulo,
    editarModulo: editarModulo,
    guardarModulo: guardarModulo,
    switchCfgTab: switchCfgTab,
    cerrarModal: cerrarModal,
    nuevoUsuario: nuevoUsuario,
    editarUsuario: editarUsuario,
    guardarUsuario: guardarUsuario,
  };

  window.iniciarLogin = iniciarLogin;
  window.cerrarSesion = cerrarSesion;
  window.abrirConfiguracion = abrirConfiguracion;

  window.addEventListener('load', async function() {
    if (recuperarSesion()) {
      mostrarLoading();
      try {
        var data = await apiGet({ action: 'getDatos', email: session.email });
        if (data.ok) {
          hubData = data.data;
          cacheData(hubData);
          iniciarHub();
        } else {
          mostrarLogin();
        }
      } catch(e) {
        console.error('load:', e);
        var cached = getCachedData();
        if (cached) {
          hubData = cached;
          showToast('Modo sin conexion — datos en cache');
          iniciarHub();
        } else {
          mostrarLogin();
        }
      }
    } else {
      mostrarLogin();
    }
  });

})();
</script>
</body>
</html>
