<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReCircula 360 - Redes Con Rostro</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
:root {
  --b1: #33A8DE;
  --b2: #506CFF;
  --g1: #18AE97;
  --g2: #0BC3FF;
  --c1: #FF751F;
  --c2: #FF376F;
  --d1: #F5AD21;
  --d2: #9FDA60;
  --tx: #333333;
  --tm: #6B6B80;
  --tl: #A0A0B0;
  --bg: linear-gradient(135deg, #e8f4fd, #eef0ff, #e8faf7);
  --surface: #ffffff;
  --border: rgba(0,0,0,0.09);
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  color: var(--tx);
  background: var(--bg);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.hidden { display: none !important; }

.grad-text {
  background: linear-gradient(90deg, var(--b1), var(--b2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── Spinner ─────────────────────────────────────────────── */
.spinner {
  width: 36px; height: 36px;
  border: 3px solid #e4f4fb;
  border-top-color: var(--b1);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ───────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--tx);
  color: #fff;
  padding: 11px 22px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  z-index: 9999;
  transition: transform 0.3s;
  white-space: nowrap;
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── LOGIN ───────────────────────────────────────────────── */
#screen-login {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
}

.login-card {
  background: #fff;
  border-radius: var(--radius-xl);
  border: 1px solid var(--border);
  padding: 52px 48px;
  width: 100%;
  max-width: 420px;
  text-align: center;
  box-shadow: 0 8px 40px rgba(0,0,0,0.08);
}

.login-logo {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 4px;
}

.login-brand {
  font-size: 13px;
  color: var(--tl);
  margin-bottom: 36px;
  font-weight: 400;
}

.login-google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  padding: 13px 20px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: #fff;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--tx);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.login-google-btn:hover { background: #f8fbfd; border-color: var(--b1); }
.login-google-icon { width: 20px; height: 20px; }
.login-domain-note { margin-top: 16px; font-size: 11.5px; color: var(--tl); }

/* ── LOADING ─────────────────────────────────────────────── */
#screen-loading {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.load-text { font-size: 14px; color: var(--tm); font-weight: 500; }

/* ── HUB ─────────────────────────────────────────────────── */
#screen-hub {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
.hub-header {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.hub-logo { font-size: 18px; font-weight: 800; }
.hub-subt { font-size: 11px; color: var(--tl); margin-top: 2px; }

.hub-user {
  display: flex;
  align-items: center;
  gap: 12px;
}

.hub-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--b1), var(--b2));
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  flex-shrink: 0;
}

.hub-username { font-size: 13px; font-weight: 600; color: var(--tx); }
.hub-role    { font-size: 11px; color: var(--tm); }

.btn-logout {
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: #fff;
  color: var(--tm);
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.btn-logout:hover { background: #fff0f3; color: #c91a44; border-color: #f5c0cc; }

/* Main content */
.hub-main {
  flex: 1;
  padding: 40px 32px;
  max-width: 1000px;
  margin: 0 auto;
  width: 100%;
}

.hub-bienvenido {
  font-size: 26px;
  font-weight: 700;
  color: var(--tx);
  margin-bottom: 8px;
}

.hub-desc {
  font-size: 14px;
  color: var(--tm);
  margin-bottom: 40px;
}

/* Módulos grid */
.modulos-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.modulos-titulo {
  font-size: 13px;
  font-weight: 700;
  color: var(--tl);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.btn-config {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: #fff;
  color: var(--tm);
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-config:hover { border-color: var(--b1); color: var(--b1); }

.modulos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

.modulo-card {
  background: #fff;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: 28px 24px;
  cursor: pointer;
  transition: box-shadow 0.2s, transform 0.15s;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: relative;
}

.modulo-card:hover {
  box-shadow: 0 6px 24px rgba(0,0,0,0.1);
  transform: translateY(-3px);
}

.modulo-card.inactivo {
  opacity: 0.5;
  cursor: not-allowed;
  pointer-events: none;
}

.modulo-card.inactivo-admin {
  opacity: 0.7;
  border-style: dashed;
}

.modulo-emoji { font-size: 36px; }

.modulo-nombre {
  font-size: 15px;
  font-weight: 700;
  color: var(--tx);
}

.modulo-desc {
  font-size: 12px;
  color: var(--tm);
  line-height: 1.5;
}

.modulo-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 10.5px;
  font-weight: 600;
  background: #f0f4f8;
  color: var(--tl);
  align-self: flex-start;
}

.modulo-badge.activo {
  background: linear-gradient(135deg, var(--b1), var(--b2));
  color: #fff;
}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal {
  background: #fff;
  border-radius: var(--radius-xl);
  width: 100%;
  max-width: 540px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}

.modal-head {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: #fff;
  z-index: 1;
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
}

.modal-title { font-size: 16px; font-weight: 700; color: var(--tx); }

.modal-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  background: #f0f4f8;
  color: var(--tm);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.modal-close:hover { background: #ffe4e9; color: #c91a44; }

.modal-body { padding: 20px 24px; }
.modal-foot {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* Forms */
.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--tm);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.form-input, .form-select {
  width: 100%;
  padding: 10px 13px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-family: 'Outfit', sans-serif;
  font-size: 13.5px;
  color: var(--tx);
  background: #fff;
  transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus { outline: none; border-color: var(--b1); }
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all 0.15s;
}
.btn-primary { background: #fff; border-color: var(--b1); color: var(--b1); }
.btn-primary:hover { background: #f0f7ff; }
.btn-glass   { background: #fff; border-color: #cdd5dd; color: var(--tm); }
.btn-glass:hover { background: #f8fbfd; }
.btn-danger  { background: #fff; border-color: #c91a44; color: #c91a44; }
.btn-sm { padding: 6px 13px; font-size: 12px; }

/* Tabs */
.tabs-bar { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.tab-btn {
  padding: 9px 20px;
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  font-size: 13px;
  font-weight: 600;
  color: var(--tm);
  cursor: pointer;
  border: 1px solid transparent;
  border-bottom: none;
  background: transparent;
  font-family: 'Outfit', sans-serif;
  transition: all 0.15s;
}
.tab-btn.active { background: #fff; color: var(--tx); border-color: var(--border); margin-bottom: -1px; }

/* Table */
.table-wrap { overflow-x: auto; border-radius: var(--radius-lg); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  background: #f4f8fb;
  padding: 11px 14px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  color: var(--tm);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-bottom: 1px solid var(--border);
}
tbody td { padding: 11px 14px; border-bottom: 1px solid #f0f4f8; color: var(--tx); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #f8fbfd; }
.td-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.15s; }
tbody tr:hover .td-actions { opacity: 1; }

.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.badge-blue  { background: #e8f4fd; color: var(--b1); }
.badge-green { background: #e4fbf4; color: #0f6e56; }
.badge-warn  { background: #fff8e4; color: #854f0b; }

/* Responsive */
@media (max-width: 600px) {
  .hub-main { padding: 24px 16px; }
  .hub-header { padding: 14px 16px; }
  .modulos-grid { grid-template-columns: 1fr 1fr; }
  .hub-bienvenido { font-size: 20px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-logo grad-text">ReCircula 360</div>
    <div class="login-brand">Una app de Redes Con Rostro</div>
    <button class="login-google-btn" onclick="iniciarLogin()">
      <svg class="login-google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continuar con Google
    </button>
    <p class="login-domain-note">Solo cuentas @redesconrostro.org</p>
  </div>
</div>

<!-- LOADING -->
<div id="screen-loading" class="hidden">
  <div class="spinner"></div>
  <div class="load-text">Cargando ReCircula 360...</div>
</div>

<!-- HUB -->
<div id="screen-hub" class="hidden">
  <div class="hub-header">
    <div>
      <div class="hub-logo grad-text">ReCircula 360</div>
      <div class="hub-subt">Redes Con Rostro</div>
    </div>
    <div class="hub-user">
      <div class="hub-avatar" id="hub-avatar">?</div>
      <div>
        <div class="hub-username" id="hub-username">—</div>
        <div class="hub-role" id="hub-role">—</div>
      </div>
      <button class="btn-logout" onclick="cerrarSesion()">
        <i class="ti ti-logout"></i> Salir
      </button>
    </div>
  </div>

  <div class="hub-main">
    <div class="hub-bienvenido" id="hub-bienvenido">Bienvenido 👋</div>
    <div class="hub-desc">Selecciona un módulo para continuar</div>

    <div class="modulos-header">
      <div class="modulos-titulo">Módulos disponibles</div>
      <button class="btn-config hidden" id="btn-config" onclick="abrirConfiguracion()">
        <i class="ti ti-settings"></i> Configuración
      </button>
    </div>

    <div class="modulos-grid" id="modulos-grid">
      <div style="color:var(--tl);font-size:13px">Cargando módulos...</div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ============================================================
// CONSTANTES
// ============================================================
const SCRIPT_URL  = 'https://script.google.com/macros/s/AKfycbyy_lNvMjFiJvUkwPhLXZsIlHJ_2vzDGmSV1TGOvBZVsgP3cndSJPwwYzwcLdgUSw4GCw/exec';
const G_CLIENT_ID = '783730193199-d7nhahv3ou4rmps7nrpoop5cpor079ej.apps.googleusercontent.com';
const DOMAIN      = 'redesconrostro.org';

let SESSION      = null;
let ACCESS_TOKEN = null;
let TOKEN_EXPIRY = 0;
let HUB_DATA     = null; // { usuario, modulos, usuarios }

// ============================================================
// LOGIN
// ============================================================

function iniciarLogin() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: G_CLIENT_ID,
    scope: 'email profile',
    callback: async (resp) => {
      if (resp.error) { showToast('Error al iniciar sesión'); return; }
      ACCESS_TOKEN = resp.access_token;
      TOKEN_EXPIRY = Date.now() + (resp.expires_in - 60) * 1000;
      await verificarUsuario();
    },
  });
  client.requestAccessToken();
}

async function verificarUsuario() {
  mostrarLoading();
  try {
    const res  = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: 'Bearer ' + ACCESS_TOKEN }
    });
    const info = await res.json();

    if (!info.email.endsWith('@' + DOMAIN)) {
      showToast('Solo cuentas @' + DOMAIN);
      mostrarLogin();
      return;
    }

    // Una sola llamada — trae usuario + módulos + usuarios
    const data = await apiGet({ action: 'getDatos', email: info.email });
    if (!data.ok) {
      showToast('Usuario no autorizado. Contacta al administrador.');
      mostrarLogin();
      return;
    }

    SESSION = {
      nombre: data.data.usuario.nombre || info.given_name,
      email:  info.email,
      rol:    data.data.usuario.rol,
    };
    HUB_DATA = data.data;

    sessionStorage.setItem('rcr_hub_session', JSON.stringify(SESSION));
    sessionStorage.setItem('rcr_hub_token',   ACCESS_TOKEN);
    sessionStorage.setItem('rcr_hub_exp',     TOKEN_EXPIRY);

    iniciarHub();
  } catch(e) {
    console.error(e);
    showToast('Error de conexión');
    mostrarLogin();
  }
}

function recuperarSesion() {
  const s   = sessionStorage.getItem('rcr_hub_session');
  const t   = sessionStorage.getItem('rcr_hub_token');
  const exp = sessionStorage.getItem('rcr_hub_exp');
  if (s && t && exp && Date.now() < parseInt(exp)) {
    SESSION      = JSON.parse(s);
    ACCESS_TOKEN = t;
    TOKEN_EXPIRY = parseInt(exp);
    return true;
  }
  return false;
}

function cerrarSesion() {
  sessionStorage.clear();
  SESSION = null; ACCESS_TOKEN = null; HUB_DATA = null;
  mostrarLogin();
  try { google.accounts.id.disableAutoSelect(); } catch(e) {}
}

// ============================================================
// INICIAR HUB
// ============================================================

function iniciarHub() {
  const iniciales = SESSION.nombre.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
  document.getElementById('hub-avatar').textContent   = iniciales;
  document.getElementById('hub-username').textContent = SESSION.nombre;
  document.getElementById('hub-role').textContent     = SESSION.rol;
  document.getElementById('hub-bienvenido').textContent = `Bienvenido, ${SESSION.nombre.split(' ')[0]} 👋`;

  if (SESSION.rol === 'Admin') {
    document.getElementById('btn-config').classList.remove('hidden');
  }

  renderModulos(HUB_DATA.modulos);
  mostrarHub();
}

function renderModulos(modulos) {
  const grid = document.getElementById('modulos-grid');
  if (!modulos || !modulos.length) {
    grid.innerHTML = '<p style="color:var(--tl);font-size:13px">No hay módulos disponibles</p>';
    return;
  }

  grid.innerHTML = modulos.map(m => {
    const activo  = m['Activo'] === true || m['Activo'] === 'TRUE';
    const tieneURL = m['URL'] && m['URL'].toString().trim() !== '';
    const clases  = activo && tieneURL ? '' : (SESSION.rol === 'Admin' ? 'inactivo-admin' : 'inactivo');

    return `
      <div class="modulo-card ${clases}" onclick="${activo && tieneURL ? `abrirModulo('${m['URL']}')` : SESSION.rol === 'Admin' ? `editarModulo('${m['ID_Modulo']}')` : ''}">
        <div class="modulo-emoji">${m['Emoji'] || '📦'}</div>
        <div>
          <div class="modulo-nombre">${m['Nombre']}</div>
          <div class="modulo-desc" style="margin-top:4px">${m['Descripcion'] || ''}</div>
        </div>
        <span class="modulo-badge ${activo ? 'activo' : ''}">
          ${activo ? 'Disponible' : 'Próximamente'}
        </span>
        ${SESSION.rol === 'Admin' ? `
          <button onclick="event.stopPropagation();editarModulo('${m['ID_Modulo']}')"
            style="position:absolute;top:12px;right:12px;border:none;background:none;cursor:pointer;color:var(--tl);font-size:16px">
            <i class="ti ti-pencil"></i>
          </button>` : ''}
      </div>`;
  }).join('');
}

function abrirModulo(url) {
  // Pasar sesión al módulo via sessionStorage (mismo dominio)
  sessionStorage.setItem('rcr_session',   JSON.stringify(SESSION));
  sessionStorage.setItem('rcr_token',     ACCESS_TOKEN);
  sessionStorage.setItem('rcr_token_exp', TOKEN_EXPIRY);
  window.location.href = url;
}

// ============================================================
// CONFIGURACIÓN (solo admin)
// ============================================================

let CONFIG_TAB = 'modulos';

function abrirConfiguracion() {
  abrirModal(`
    <div class="modal" style="max-width:660px">
      <div class="modal-head">
        <div class="modal-title"><i class="ti ti-settings"></i> Configuración</div>
        <button class="modal-close" onclick="cerrarModal()"><i class="ti ti-x"></i></button>
      </div>
      <div class="modal-body">
        <div class="tabs-bar">
          <button class="tab-btn active" id="cfg-tab-modulos" onclick="switchCfgTab('modulos')">
            <i class="ti ti-layout-grid"></i> Módulos
          </button>
          <button class="tab-btn" id="cfg-tab-usuarios" onclick="switchCfgTab('usuarios')">
            <i class="ti ti-users"></i> Usuarios
          </button>
        </div>
        <div id="cfg-content"></div>
      </div>
    </div>
  `);
  switchCfgTab('modulos');
}

function switchCfgTab(tab) {
  CONFIG_TAB = tab;
  document.querySelectorAll('[id^="cfg-tab-"]').forEach(el => el.classList.remove('active'));
  document.getElementById('cfg-tab-' + tab)?.classList.add('active');
  if (tab === 'modulos')  renderCfgModulos();
  if (tab === 'usuarios') renderCfgUsuarios();
}

// ── Módulos ───────────────────────────────────────────────
function renderCfgModulos() {
  const modulos = HUB_DATA.modulos || [];
  const filas   = modulos.map(m => `
    <tr>
      <td>${m['Emoji'] || '—'}</td>
      <td style="font-weight:500">${m['Nombre']}</td>
      <td style="font-size:12px;color:var(--tm);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m['URL'] || '—'}</td>
      <td><span class="badge ${m['Activo']===true||m['Activo']==='TRUE'?'badge-green':'badge-warn'}">${m['Activo']===true||m['Activo']==='TRUE'?'Activo':'Inactivo'}</span></td>
      <td>
        <div class="td-actions">
          <button class="btn btn-glass btn-sm" onclick="editarModulo('${m['ID_Modulo']}')">
            <i class="ti ti-pencil"></i>
          </button>
        </div>
      </td>
    </tr>`).join('');

  document.getElementById('cfg-content').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Emoji</th><th>Nombre</th><th>URL</th><th>Estado</th><th></th></tr></thead>
        <tbody>${filas || '<tr><td colspan="5" style="text-align:center;color:var(--tl);padding:20px">Sin módulos</td></tr>'}</tbody>
      </table>
    </div>`;
}

function editarModulo(id) {
  const m = (HUB_DATA.modulos || []).find(x => x['ID_Modulo'] === id);
  if (!m) return;

  const contenido = `
    <div style="padding:16px 0">
      <div class="form-group">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-input" id="mod-nombre" value="${m['Nombre'] || ''}" readonly
          style="background:#f8fbfd;color:var(--tm)">
      </div>
      <div class="form-group">
        <label class="form-label">URL *</label>
        <input type="url" class="form-input" id="mod-url" placeholder="https://..."
          value="${m['URL'] || ''}">
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">Emoji</label>
          <input type="text" class="form-input" id="mod-emoji" value="${m['Emoji'] || ''}" maxlength="4">
        </div>
        <div class="form-group">
          <label class="form-label">Activo</label>
          <select class="form-select" id="mod-activo">
            <option value="TRUE"  ${m['Activo']===true||m['Activo']==='TRUE'?'selected':''}>Sí</option>
            <option value="FALSE" ${m['Activo']===false||m['Activo']==='FALSE'?'selected':''}>No</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Descripción</label>
        <input type="text" class="form-input" id="mod-desc" value="${m['Descripcion'] || ''}">
      </div>
      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:8px">
        <button class="btn btn-glass" onclick="switchCfgTab('modulos')">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarModulo('${id}')">
          <i class="ti ti-check"></i> Guardar
        </button>
      </div>
    </div>`;

  document.getElementById('cfg-content').innerHTML = contenido;
}

async function guardarModulo(id) {
  const url    = document.getElementById('mod-url')?.value?.trim();
  const emoji  = document.getElementById('mod-emoji')?.value?.trim();
  const activo = document.getElementById('mod-activo')?.value === 'TRUE';
  const desc   = document.getElementById('mod-desc')?.value?.trim();

  try {
    const m = (HUB_DATA.modulos || []).find(x => x['ID_Modulo'] === id);
    const res = await apiPost({ action: 'saveModulo', data: {
      ID_Modulo: id, Nombre: m?.['Nombre'], URL: url,
      Emoji: emoji, Activo: activo, Descripcion: desc,
    }});
    if (!res.ok) { showToast('Error al guardar'); return; }

    // Actualizar local
    const idx = HUB_DATA.modulos.findIndex(x => x['ID_Modulo'] === id);
    if (idx >= 0) {
      HUB_DATA.modulos[idx] = { ...HUB_DATA.modulos[idx], URL: url, Emoji: emoji, Activo: activo, Descripcion: desc };
    }

    showToast('Módulo actualizado ✓');
    renderModulos(HUB_DATA.modulos);
    switchCfgTab('modulos');
  } catch(e) { showToast('Error de conexión'); }
}

// ── Usuarios ──────────────────────────────────────────────
function renderCfgUsuarios() {
  const usuarios = HUB_DATA.usuarios || [];
  const filas    = usuarios.map(u => `
    <tr>
      <td style="font-weight:500">${u['Nombre']}</td>
      <td style="font-size:12px;color:var(--tm)">${u['Email']}</td>
      <td><span class="badge ${u['Rol']==='Admin'?'badge-blue':u['Rol']==='Editor'?'badge-green':'badge-warn'}">${u['Rol']}</span></td>
      <td><span class="badge ${u['Activo']===true||u['Activo']==='TRUE'?'badge-green':'badge-warn'}">${u['Activo']===true||u['Activo']==='TRUE'?'Activo':'Inactivo'}</span></td>
      <td>
        <div class="td-actions">
          <button class="btn btn-glass btn-sm" onclick="editarUsuario('${u['ID_Usuario']}')">
            <i class="ti ti-pencil"></i>
          </button>
        </div>
      </td>
    </tr>`).join('');

  document.getElementById('cfg-content').innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="btn btn-primary btn-sm" onclick="nuevoUsuario()">
        <i class="ti ti-plus"></i> Nuevo usuario
      </button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Activo</th><th></th></tr></thead>
        <tbody>${filas || '<tr><td colspan="5" style="text-align:center;color:var(--tl);padding:20px">Sin usuarios</td></tr>'}</tbody>
      </table>
    </div>`;
}

function nuevoUsuario() { editarUsuario(null); }

function editarUsuario(id) {
  const u = id ? (HUB_DATA.usuarios || []).find(x => x['ID_Usuario'] === id) : null;

  const form = `
    <div style="padding:16px 0">
      <div class="form-group">
        <label class="form-label">Nombre *</label>
        <input type="text" class="form-input" id="usr-nombre" value="${u?.['Nombre']||''}">
      </div>
      <div class="form-group">
        <label class="form-label">Email *</label>
        <input type="email" class="form-input" id="usr-email" value="${u?.['Email']||''}"
          placeholder="nombre@redesconrostro.org" ${u?'readonly style="background:#f8fbfd;color:var(--tm)"':''}>
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">Rol</label>
          <select class="form-select" id="usr-rol">
            <option value="Admin"        ${u?.['Rol']==='Admin'?'selected':''}>Admin</option>
            <option value="Editor"       ${u?.['Rol']==='Editor'?'selected':''}>Editor</option>
            <option value="Visualizador" ${u?.['Rol']==='Visualizador'?'selected':''}>Visualizador</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Activo</label>
          <select class="form-select" id="usr-activo">
            <option value="true"  ${u?.['Activo']!==false?'selected':''}>Sí</option>
            <option value="false" ${u?.['Activo']===false?'selected':''}>No</option>
          </select>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:8px">
        <button class="btn btn-glass" onclick="switchCfgTab('usuarios')">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarUsuario('${id||''}')">
          <i class="ti ti-check"></i> ${u ? 'Actualizar' : 'Guardar'}
        </button>
      </div>
    </div>`;

  document.getElementById('cfg-content').innerHTML = form;
}

async function guardarUsuario(id) {
  const nombre = document.getElementById('usr-nombre')?.value?.trim();
  const email  = document.getElementById('usr-email')?.value?.trim();
  const rol    = document.getElementById('usr-rol')?.value;
  const activo = document.getElementById('usr-activo')?.value === 'true';

  if (!nombre || !email) { showToast('Nombre y email son obligatorios'); return; }
  if (!email.endsWith('@' + DOMAIN)) { showToast('Solo cuentas @' + DOMAIN); return; }

  try {
    const res = await apiPost({ action: 'saveUsuario', data: {
      ID_Usuario: id || '', Nombre: nombre, Email: email, Rol: rol, Activo: activo,
    }});
    if (!res.ok) { showToast('Error al guardar'); return; }

    // Actualizar local
    if (id) {
      const idx = HUB_DATA.usuarios.findIndex(x => x['ID_Usuario'] === id);
      if (idx >= 0) HUB_DATA.usuarios[idx] = { ...HUB_DATA.usuarios[idx], Nombre: nombre, Rol: rol, Activo: activo };
    } else {
      HUB_DATA.usuarios.push({ ID_Usuario: res.id, Nombre: nombre, Email: email, Rol: rol, Activo: activo });
    }

    showToast(id ? 'Usuario actualizado ✓' : 'Usuario creado ✓');
    switchCfgTab('usuarios');
  } catch(e) { showToast('Error de conexión'); }
}

// ============================================================
// HELPERS
// ============================================================

async function apiGet(params) {
  const qs  = new URLSearchParams(params).toString();
  const res = await fetch(SCRIPT_URL + '?' + qs);
  return res.json();
}

async function apiPost(body) {
  const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(body) });
  return res.json();
}

function mostrarLogin()   {
  document.getElementById('screen-login').classList.remove('hidden');
  document.getElementById('screen-loading').classList.add('hidden');
  document.getElementById('screen-hub').classList.add('hidden');
}
function mostrarLoading() {
  document.getElementById('screen-login').classList.add('hidden');
  document.getElementById('screen-loading').classList.remove('hidden');
  document.getElementById('screen-hub').classList.add('hidden');
}
function mostrarHub()     {
  document.getElementById('screen-login').classList.add('hidden');
  document.getElementById('screen-loading').classList.add('hidden');
  document.getElementById('screen-hub').classList.remove('hidden');
}

function showToast(msg, dur = 3500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function abrirModal(html) {
  cerrarModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay';
  overlay.innerHTML = html;
  overlay.addEventListener('click', e => { if (e.target === overlay) cerrarModal(); });
  document.body.appendChild(overlay);
}

function cerrarModal() {
  const m = document.getElementById('modal-overlay');
  if (m) m.remove();
}

// ============================================================
// INICIO
// ============================================================

window.addEventListener('load', async () => {
  if (recuperarSesion()) {
    mostrarLoading();
    try {
      const data = await apiGet({ action: 'getDatos', email: SESSION.email });
      if (data.ok) {
        HUB_DATA = data.data;
        iniciarHub();
      } else {
        mostrarLogin();
      }
    } catch(e) {
      mostrarLogin();
    }
  } else {
    mostrarLogin();
  }
});
</script>
</body>
