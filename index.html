<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReCircula 360 - Redes Con Rostro</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
:root {
  --b1: #33A8DE;
  --b2: #506CFF;
  --g1: #18AE97;
  --g2: #0BC3FF;
  --c1: #FF751F;
  --c2: #FF376F;
  --d1: #F5AD21;
  --d2: #9FDA60;
  --tx: #333333;
  --tm: #6B6B80;
  --tl: #A0A0B0;
  --bg: linear-gradient(135deg, #e8f4fd, #eef0ff, #e8faf7);
  --surface: #ffffff;
  --border: rgba(0,0,0,0.09);
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Outfit', sans-serif;
  color: var(--tx);
  background: var(--bg);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.hidden { display: none !important; }

.grad-text {
  background: linear-gradient(90deg, var(--b1), var(--b2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── Offline Banner ──────────────────────────────────────── */
#offline-banner {
  position: fixed;
  top: 0; left: 0; right: 0;
  background: #c91a44;
  color: #fff;
  text-align: center;
  padding: 8px 16px;
  font-size: 12.5px;
  font-weight: 600;
  z-index: 10000;
  transform: translateY(-100%);
  transition: transform 0.3s;
}
#offline-banner.show { transform: translateY(0); }

/* ── Spinner ─────────────────────────────────────────────── */
.spinner {
  width: 36px; height: 36px;
  border: 3px solid #e4f4fb;
  border-top-color: var(--b1);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ───────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--tx);
  color: #fff;
  padding: 11px 22px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  z-index: 9999;
  transition: transform 0.3s;
  white-space: nowrap;
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── LOGIN ───────────────────────────────────────────────── */
#screen-login {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
}

.login-card {
  background: #fff;
  border-radius: var(--radius-xl);
  border: 1px solid var(--border);
  padding: 52px 48px;
  width: 100%;
  max-width: 420px;
  text-align: center;
  box-shadow: 0 8px 40px rgba(0,0,0,0.08);
}

.login-logo {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 4px;
}

.login-brand {
  font-size: 13px;
  color: var(--tl);
  margin-bottom: 36px;
  font-weight: 400;
}

.login-google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  padding: 13px 20px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: #fff;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--tx);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.login-google-btn:hover { background: #f8fbfd; border-color: var(--b1); }
.login-google-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.login-google-icon { width: 20px; height: 20px; }
.login-domain-note { margin-top: 16px; font-size: 11.5px; color: var(--tl); }

/* ── LOADING ─────────────────────────────────────────────── */
#screen-loading {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.load-text { font-size: 14px; color: var(--tm); font-weight: 500; }

/* ── HUB ─────────────────────────────────────────────────── */
#screen-hub {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
.hub-header {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.hub-logo { font-size: 18px; font-weight: 800; }
.hub-subt { font-size: 11px; color: var(--tl); margin-top: 2px; }

.hub-user {
  display: flex;
  align-items: center;
  gap: 12px;
}

.hub-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--b1), var(--b2));
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  flex-shrink: 0;
}

.hub-username { font-size: 13px; font-weight: 600; color: var(--tx); }
.hub-role    { font-size: 11px; color: var(--tm); }

.btn-logout {
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: #fff;
  color: var(--tm);
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.btn-logout:hover { background: #fff0f3; color: #c91a44; border-color: #f5c0cc; }

/* Main content */
.hub-main {
  flex: 1;
  padding: 40px 32px;
  max-width: 1000px;
  margin: 0 auto;
  width: 100%;
}

.hub-bienvenido {
  font-size: 26px;
  font-weight: 700;
  color: var(--tx);
  margin-bottom: 8px;
}

.hub-desc {
  font-size: 14px;
  color: var(--tm);
  margin-bottom: 40px;
}

/* Módulos grid */
.modulos-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.modulos-titulo {
  font-size: 13px;
  font-weight: 700;
  color: var(--tl);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.btn-config {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: #fff;
  color: var(--tm);
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-config:hover { border-color: var(--b1); color: var(--b1); }

.modulos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}

.modulo-card {
  background: #fff;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: 28px 24px;
  cursor: pointer;
  transition: box-shadow 0.2s, transform 0.15s;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: relative;
}

.modulo-card:hover {
  box-shadow: 0 6px 24px rgba(0,0,0,0.1);
  transform: translateY(-3px);
}

.modulo-card.inactivo {
  opacity: 0.5;
  cursor: not-allowed;
  pointer-events: none;
}

.modulo-card.inactivo-admin {
  opacity: 0.7;
  border-style: dashed;
}

/* Mosaico de módulo (reemplaza al emoji) */
.modulo-icon {
  width: 52px; height: 52px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 22px;
  font-weight: 800;
  flex-shrink: 0;
  text-transform: uppercase;
}
.mi-0 { background: linear-gradient(135deg, var(--b1), var(--b2)); }
.mi-1 { background: linear-gradient(135deg, var(--g1), var(--g2)); }
.mi-2 { background: linear-gradient(135deg, var(--c1), var(--c2)); }
.mi-3 { background: linear-gradient(135deg, var(--d1), var(--d2)); }

.modulo-nombre {
  font-size: 15px;
  font-weight: 700;
  color: var(--tx);
}

.modulo-desc {
  font-size: 12px;
  color: var(--tm);
  line-height: 1.5;
}

.modulo-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 10.5px;
  font-weight: 600;
  background: #f0f4f8;
  color: var(--tl);
  align-self: flex-start;
}

.modulo-badge.activo {
  background: linear-gradient(135deg, var(--b1), var(--b2));
  color: #fff;
}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal {
  background: #fff;
  border-radius: var(--radius-xl);
  width: 100%;
  max-width: 540px;
  max-height: 90vh;
  overflow-y: auto;
  scroll-behavior: smooth;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}

.modal-head {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: #fff;
  z-index: 1;
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
}

.modal-title { font-size: 16px; font-weight: 700; color: var(--tx); }

.modal-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  background: #f0f4f8;
  color: var(--tm);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.modal-close:hover { background: #ffe4e9; color: #c91a44; }

.modal-body { padding: 20px 24px; }
.modal-foot {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* Forms */
.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--tm);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.form-input, .form-select {
  width: 100%;
  padding: 10px 13px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-family: 'Outfit', sans-serif;
  font-size: 13.5px;
  color: var(--tx);
  background: #fff;
  transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus { outline: none; border-color: var(--b1); }
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* Lista de módulos por usuario (checkboxes) */
.mod-check-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px;
  max-height: 190px;
  overflow-y: auto;
}
.mod-check-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13.5px;
  color: var(--tx);
  padding: 7px 8px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.12s;
}
.mod-check-item:hover { background: #f4f8fb; }
.mod-check-item input { width: 16px; height: 16px; accent-color: var(--b1); cursor: pointer; }
.mod-check-item .mci-id { font-size: 11px; color: var(--tl); margin-left: auto; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all 0.15s;
}
.btn-primary { background: #fff; border-color: var(--b1); color: var(--b1); }
.btn-primary:hover { background: #f0f7ff; }
.btn-glass   { background: #fff; border-color: #cdd5dd; color: var(--tm); }
.btn-glass:hover { background: #f8fbfd; }
.btn-danger  { background: #fff; border-color: #c91a44; color: #c91a44; }
.btn-sm { padding: 6px 13px; font-size: 12px; }

/* Tabs */
.tabs-bar { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.tab-btn {
  padding: 9px 20px;
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  font-size: 13px;
  font-weight: 600;
  color: var(--tm);
  cursor: pointer;
  border: 1px solid transparent;
  border-bottom: none;
  background: transparent;
  font-family: 'Outfit', sans-serif;
  transition: all 0.15s;
}
.tab-btn.active { background: #fff; color: var(--tx); border-color: var(--border); margin-bottom: -1px; }

/* Table */
.table-wrap { overflow-x: auto; border-radius: var(--radius-lg); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  background: #f4f8fb;
  padding: 11px 14px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  color: var(--tm);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-bottom: 1px solid var(--border);
}
tbody td { padding: 11px 14px; border-bottom: 1px solid #f0f4f8; color: var(--tx); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #f8fbfd; }
.td-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.15s; }
tbody tr:hover .td-actions { opacity: 1; }

.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.badge-blue  { background: #e8f4fd; color: var(--b1); }
.badge-green { background: #e4fbf4; color: #0f6e56; }
.badge-warn  { background: #fff8e4; color: #854f0b; }

/* Responsive */
@media (max-width: 768px) {
  .modulos-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
}

@media (max-width: 600px) {
  .hub-main { padding: 24px 16px; }
  .hub-header { padding: 14px 16px; flex-wrap: wrap; gap: 10px; }
  .modulos-grid { grid-template-columns: 1fr; }
  .hub-bienvenido { font-size: 20px; }
  .td-actions { opacity: 1; }
  .form-grid-2 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Offline Banner -->
<div id="offline-banner">
  <i class="ti ti-wifi-off"></i> Sin conexion — Mostrando datos en cache
</div>

<!-- LOGIN -->
<div id="screen-login" class="hidden">
  <div class="login-card">
    <div class="login-logo grad-text">ReCircula 360</div>
    <div class="login-brand">Una app de Redes Con Rostro</div>
    <button class="login-google-btn" id="btn-login" onclick="iniciarLogin()">
      <svg class="login-google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continuar con Google
    </button>
    <p class="login-domain-note">Solo cuentas @redesconrostro.org</p>
  </div>
</div>

<!-- LOADING -->
<div id="screen-loading">
  <div class="spinner"></div>
  <div class="load-text">Cargando ReCircula 360...</div>
</div>

<!-- HUB -->
<div id="screen-hub" class="hidden">
  <div class="hub-header">
    <div>
      <div class="hub-logo grad-text">ReCircula 360</div>
      <div class="hub-subt">Redes Con Rostro</div>
    </div>
    <div class="hub-user">
      <div class="hub-avatar" id="hub-avatar">?</div>
      <div>
        <div class="hub-username" id="hub-username">—</div>
        <div class="hub-role" id="hub-role">—</div>
      </div>
      <button class="btn-logout" onclick="cerrarSesion()">
        <i class="ti ti-logout"></i> Salir
      </button>
    </div>
  </div>

  <div class="hub-main">
    <div class="hub-bienvenido" id="hub-bienvenido">Bienvenido</div>
    <div class="hub-desc">Selecciona un modulo para continuar</div>

    <div class="modulos-header">
      <div class="modulos-titulo">Modulos disponibles</div>
      <button class="btn-config hidden" id="btn-config" onclick="abrirConfiguracion()">
        <i class="ti ti-settings"></i> Configuracion
      </button>
    </div>

    <div class="modulos-grid" id="modulos-grid">
      <div style="color:var(--tl);font-size:13px">Cargando modulos...</div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signOut,
  onAuthStateChanged, setPersistence, browserSessionPersistence
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import {
  initializeFirestore, persistentLocalCache, persistentMultipleTabManager,
  collection, getDocs, query, where, doc, updateDoc, addDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

// ── Configuración Firebase ─────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyApr5rH2FzuINhO26VgeYJWJAr1jznP6WI",
  authDomain: "recircula360.firebaseapp.com",
  projectId: "recircula360",
  storageBucket: "recircula360.firebasestorage.app",
  messagingSenderId: "871869415100",
  appId: "1:871869415100:web:6fe89ec7d5f632eb7a5ab9"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
// Firestore con caché offline (IndexedDB) — lecturas funcionan sin conexión
let db;
try {
  db = initializeFirestore(app, {
    localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
  });
} catch (e) {
  console.warn('Persistencia offline no disponible:', e);
  db = initializeFirestore(app, {});
}

const DOMAIN = 'redesconrostro.org';
const TOKEN_MARGIN_MS = 5 * 60 * 1000;

// Scopes que heredan las apps hijas (transitorio hasta migrarlas a Firebase)
const GOOGLE_SCOPES = [
  'https://www.googleapis.com/auth/drive',
  'https://www.googleapis.com/auth/spreadsheets.readonly'
];

let session     = null;
let googleToken = null;   // token OAuth de Google (para apps hijas)
let tokenExpiry = 0;
let hubData     = null;
let isOnline    = navigator.onLine;
let booted      = false;

// ── Utilidades ─────────────────────────────────────────────
function esc(str) {
  if (str === null || str === undefined) return '';
  const div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}
function escJs(str) {
  return String(str === null || str === undefined ? '' : str).replace(/'/g, "\\'");
}
function isValidUrl(str) {
  try {
    const u = new URL(str);
    return u.protocol === 'http:' || u.protocol === 'https:';
  } catch { return false; }
}
function isActivo(val) { return val === true || val === 'TRUE' || val === 'true'; }

function updateOnlineStatus() {
  isOnline = navigator.onLine;
  const banner = document.getElementById('offline-banner');
  if (!isOnline) banner.classList.add('show');
  else banner.classList.remove('show');
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// ── Caché local (resume rápido + offline) ──────────────────
function cacheData(data) {
  try {
    localStorage.setItem('rcr_hub_data', JSON.stringify(data));
    localStorage.setItem('rcr_hub_cache_time', String(Date.now()));
  } catch(e) { console.warn('Cache write failed', e); }
}
function getCachedData() {
  try {
    const raw = localStorage.getItem('rcr_hub_data');
    if (raw) return JSON.parse(raw);
  } catch(e) { console.warn('Cache read failed', e); }
  return null;
}

// ── LOGIN con Firebase Auth ────────────────────────────────
async function iniciarLogin() {
  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  try {
    await setPersistence(auth, browserSessionPersistence);

    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ hd: DOMAIN }); // sugerencia de dominio
    GOOGLE_SCOPES.forEach(s => provider.addScope(s));

    const result = await signInWithPopup(auth, provider);

    // Token OAuth de Google para las apps hijas (transitorio)
    const credential = GoogleAuthProvider.credentialFromResult(result);
    if (credential && credential.accessToken) {
      googleToken = credential.accessToken;
      tokenExpiry = Date.now() + 55 * 60 * 1000; // ~55 min
      sessionStorage.setItem('rcr_hub_token', googleToken);
      sessionStorage.setItem('rcr_hub_exp', String(tokenExpiry));
    }
    // El resto del flujo lo maneja onAuthStateChanged
  } catch(e) {
    console.error('iniciarLogin:', e);
    if (e && e.code === 'auth/popup-closed-by-user') {
      showToast('Inicio de sesion cancelado');
    } else {
      showToast('Error al iniciar sesion');
    }
    btn.disabled = false;
  }
}

// ── Cargar datos desde Firestore y entrar ──────────────────
async function cargarDatosYEntrar(user) {
  try {
    // 1) Mi documento de usuario (por email)
    const qUsr = query(collection(db, 'Usuarios'), where('email', '==', user.email));
    const usrSnap = await getDocs(qUsr);

    if (usrSnap.empty) {
      showToast('Usuario no autorizado. Contacta al administrador.');
      await signOut(auth);
      mostrarLogin();
      return;
    }

    const meDoc = usrSnap.docs[0];
    const me = { _docId: meDoc.id, ...meDoc.data() };

    if (me.activo === false) {
      showToast('Tu cuenta esta inactiva. Contacta al administrador.');
      await signOut(auth);
      mostrarLogin();
      return;
    }

    // 2) Módulos (todos)
    const modSnap = await getDocs(collection(db, 'Modulos'));
    const modulos = modSnap.docs.map(d => ({ _docId: d.id, ...d.data() }));

    // 3) Usuarios completos (solo Admin los necesita para el panel)
    let usuarios = [me];
    if (me.rol === 'Admin') {
      const allSnap = await getDocs(collection(db, 'Usuarios'));
      usuarios = allSnap.docs.map(d => ({ _docId: d.id, ...d.data() }));
    }

    session = {
      _docId:  me._docId,
      nombre:  me.nombre || user.displayName || 'Usuario',
      email:   me.email,
      rol:     me.rol || 'Visualizador',
      modulos: Array.isArray(me.modulos) ? me.modulos : []
    };
    hubData = { usuario: me, usuarios, modulos };

    cacheData(hubData);
    sessionStorage.setItem('rcr_hub_session', JSON.stringify(session));

    iniciarHub();
  } catch(e) {
    console.error('cargarDatosYEntrar:', e);
    // Fallback offline: caché local + sesión guardada
    const cached = getCachedData();
    const savedSession = sessionStorage.getItem('rcr_hub_session');
    if (cached && savedSession) {
      session = JSON.parse(savedSession);
      hubData = cached;
      showToast('Modo sin conexion — datos en cache');
      iniciarHub();
      return;
    }
    showToast('Error al cargar datos');
    mostrarLogin();
  }
}

// ── Cerrar sesión ──────────────────────────────────────────
async function cerrarSesion() {
  try { await signOut(auth); } catch(e) {}
  sessionStorage.clear();
  try {
    localStorage.removeItem('rcr_hub_data');
    localStorage.removeItem('rcr_hub_cache_time');
  } catch(e) {}
  session = null; googleToken = null; hubData = null;
  mostrarLogin();
}

// ── Render del Hub ─────────────────────────────────────────
function iniciarHub() {
  if (!session || !session.nombre) { mostrarLogin(); return; }

  const nombre = session.nombre;
  const partes = nombre.trim().split(/\s+/).filter(Boolean);
  const iniciales = partes.length >= 2
    ? (partes[0][0] + partes[partes.length - 1][0]).toUpperCase()
    : nombre.substring(0, 2).toUpperCase();

  document.getElementById('hub-avatar').textContent   = iniciales;
  document.getElementById('hub-username').textContent = nombre;
  document.getElementById('hub-role').textContent     = session.rol;
  document.getElementById('hub-bienvenido').textContent = 'Bienvenido, ' + partes[0];

  document.getElementById('btn-config').classList.toggle('hidden', session.rol !== 'Admin');

  renderModulos();
  mostrarHub();
}

// Módulos visibles: Admin ve todos; el resto solo los asignados
function modulosVisibles() {
  const todos = (hubData && hubData.modulos) || [];
  if (session.rol === 'Admin') return todos;
  const permitidos = session.modulos || [];
  return todos.filter(m => permitidos.includes(m.id_modulo));
}

function renderModulos() {
  const grid = document.getElementById('modulos-grid');
  const modulos = modulosVisibles();

  if (!modulos.length) {
    grid.innerHTML = '<p style="color:var(--tl);font-size:13px">No tienes modulos asignados. Contacta al administrador.</p>';
    return;
  }

  grid.innerHTML = modulos.map(function(m, i) {
    var activo   = isActivo(m.activo);
    var tieneURL = m.url && m.url.toString().trim() !== '';
    var idMod    = m.id_modulo || '';
    var url      = m.url || '';
    var nombre   = m.nombre || '';
    var inicial  = (nombre.trim()[0] || '?');

    var clases  = activo && tieneURL ? '' : (session.rol === 'Admin' ? 'inactivo-admin' : 'inactivo');
    var onclick = activo && tieneURL
        ? "App.abrirModulo('" + escJs(url) + "')"
        : (session.rol === 'Admin' ? "App.editarModulo('" + escJs(m._docId) + "')" : '');

    return '<div class="modulo-card ' + clases + '" onclick="' + onclick + '">' +
      '<div class="modulo-icon mi-' + (i % 4) + '">' + esc(inicial) + '</div>' +
      '<div>' +
        '<div class="modulo-nombre">' + esc(nombre) + '</div>' +
        '<div class="modulo-desc" style="margin-top:4px">' + esc(m.descripcion || '') + '</div>' +
      '</div>' +
      '<span class="modulo-badge ' + (activo && tieneURL ? 'activo' : '') + '">' +
        (activo && tieneURL ? 'Disponible' : 'Proximamente') +
      '</span>' +
      (session.rol === 'Admin'
        ? '<button onclick="event.stopPropagation();App.editarModulo(\'' + escJs(m._docId) + '\')" style="position:absolute;top:12px;right:12px;border:none;background:none;cursor:pointer;color:var(--tl);font-size:16px"><i class="ti ti-pencil"></i></button>'
        : '') +
    '</div>';
  }).join('');
}

function abrirModulo(url) {
  if (!isValidUrl(url)) { showToast('URL invalida'); return; }
  // Pasar sesión + token a la app hija (transitorio)
  sessionStorage.setItem('rcr_session',   JSON.stringify(session));
  if (googleToken) {
    sessionStorage.setItem('rcr_token',     googleToken);
    sessionStorage.setItem('rcr_token_exp', String(tokenExpiry));
  }
  window.location.href = url;
}

// ── Configuración (Admin) ──────────────────────────────────
var CONFIG_TAB = 'modulos';

function abrirConfiguracion() {
  abrirModal(
    '<div class="modal" style="max-width:660px">' +
      '<div class="modal-head">' +
        '<div class="modal-title"><i class="ti ti-settings"></i> Configuracion</div>' +
        '<button class="modal-close" onclick="App.cerrarModal()"><i class="ti ti-x"></i></button>' +
      '</div>' +
      '<div class="modal-body">' +
        '<div class="tabs-bar">' +
          '<button class="tab-btn active" id="cfg-tab-modulos" onclick="App.switchCfgTab(\'modulos\')"><i class="ti ti-layout-grid"></i> Modulos</button>' +
          '<button class="tab-btn" id="cfg-tab-usuarios" onclick="App.switchCfgTab(\'usuarios\')"><i class="ti ti-users"></i> Usuarios</button>' +
        '</div>' +
        '<div id="cfg-content"></div>' +
      '</div>' +
    '</div>'
  );
  switchCfgTab('modulos');
}

function switchCfgTab(tab) {
  CONFIG_TAB = tab;
  document.querySelectorAll('[id^="cfg-tab-"]').forEach(function(el) { el.classList.remove('active'); });
  var tabEl = document.getElementById('cfg-tab-' + tab);
  if (tabEl) tabEl.classList.add('active');
  if (tab === 'modulos')  renderCfgModulos();
  if (tab === 'usuarios') renderCfgUsuarios();
}

function renderCfgModulos() {
  var modulos = (hubData.modulos || []);
  var filas = modulos.map(function(m) {
    var a = isActivo(m.activo);
    return '<tr>' +
      '<td style="font-weight:500">' + esc(m.nombre) + '</td>' +
      '<td style="font-size:12px;color:var(--tm);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + esc(m.url || '') + '">' + esc(m.url || '\u2014') + '</td>' +
      '<td><span class="badge ' + (a ? 'badge-green' : 'badge-warn') + '">' + (a ? 'Activo' : 'Inactivo') + '</span></td>' +
      '<td><div class="td-actions">' +
        '<button class="btn btn-glass btn-sm" onclick="App.editarModulo(\'' + escJs(m._docId) + '\')"><i class="ti ti-pencil"></i></button>' +
      '</div></td>' +
    '</tr>';
  }).join('');

  document.getElementById('cfg-content').innerHTML =
    '<div class="table-wrap">' +
      '<table>' +
        '<thead><tr><th>Nombre</th><th>URL</th><th>Estado</th><th></th></tr></thead>' +
        '<tbody>' + (filas || '<tr><td colspan="4" style="text-align:center;color:var(--tl);padding:20px">Sin modulos</td></tr>') + '</tbody>' +
      '</table>' +
    '</div>';
}

function editarModulo(docId) {
  var m = (hubData.modulos || []).find(function(x) { return x._docId === docId; });
  if (!m) return;

  var a = isActivo(m.activo);
  var contenido =
    '<div style="padding:16px 0">' +
      '<div class="form-group">' +
        '<label class="form-label">Nombre</label>' +
        '<input type="text" class="form-input" id="mod-nombre" value="' + esc(m.nombre || '') + '" readonly style="background:#f8fbfd;color:var(--tm)">' +
      '</div>' +
      '<div class="form-group">' +
        '<label class="form-label">URL</label>' +
        '<input type="url" class="form-input" id="mod-url" placeholder="https://..." value="' + esc(m.url || '') + '">' +
      '</div>' +
      '<div class="form-group">' +
        '<label class="form-label">Descripcion</label>' +
        '<input type="text" class="form-input" id="mod-desc" value="' + esc(m.descripcion || '') + '">' +
      '</div>' +
      '<div class="form-group">' +
        '<label class="form-label">Activo</label>' +
        '<select class="form-select" id="mod-activo">' +
          '<option value="TRUE"' + (a ? ' selected' : '') + '>Si</option>' +
          '<option value="FALSE"' + (!a ? ' selected' : '') + '>No</option>' +
        '</select>' +
      '</div>' +
      '<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:8px">' +
        '<button class="btn btn-glass" onclick="App.switchCfgTab(\'modulos\')">Cancelar</button>' +
        '<button class="btn btn-primary" onclick="App.guardarModulo(\'' + escJs(docId) + '\')"><i class="ti ti-check"></i> Guardar</button>' +
      '</div>' +
    '</div>';

  document.getElementById('cfg-content').innerHTML = contenido;
}

async function guardarModulo(docId) {
  var urlEl    = document.getElementById('mod-url');
  var activoEl = document.getElementById('mod-activo');
  var descEl   = document.getElementById('mod-desc');
  if (!urlEl || !activoEl || !descEl) { showToast('Error en el formulario'); return; }

  var url    = urlEl.value.trim();
  var activo = activoEl.value === 'TRUE';
  var desc   = descEl.value.trim();

  if (url && !isValidUrl(url)) { showToast('URL invalida'); return; }

  try {
    await updateDoc(doc(db, 'Modulos', docId), { url: url, descripcion: desc, activo: activo });

    var idx = hubData.modulos.findIndex(function(x) { return x._docId === docId; });
    if (idx >= 0) {
      hubData.modulos[idx] = Object.assign({}, hubData.modulos[idx], { url: url, descripcion: desc, activo: activo });
    }
    cacheData(hubData);
    showToast('Modulo actualizado');
    renderModulos();
    switchCfgTab('modulos');
  } catch(e) {
    console.error('guardarModulo:', e);
    showToast('Error al guardar');
  }
}

function renderCfgUsuarios() {
  var usuarios = hubData.usuarios || [];
  var filas = usuarios.map(function(u) {
    var rolClass = u.rol === 'Admin' ? 'badge-blue' : u.rol === 'Editor' ? 'badge-green' : 'badge-warn';
    var a = isActivo(u.activo);
    var nMods = Array.isArray(u.modulos) ? u.modulos.length : 0;
    return '<tr>' +
      '<td style="font-weight:500">' + esc(u.nombre) + '</td>' +
      '<td style="font-size:12px;color:var(--tm)">' + esc(u.email) + '</td>' +
      '<td><span class="badge ' + rolClass + '">' + esc(u.rol) + '</span></td>' +
      '<td style="font-size:12px;color:var(--tm)">' + nMods + ' mod.</td>' +
      '<td><span class="badge ' + (a ? 'badge-green' : 'badge-warn') + '">' + (a ? 'Activo' : 'Inactivo') + '</span></td>' +
      '<td><div class="td-actions">' +
        '<button class="btn btn-glass btn-sm" onclick="App.editarUsuario(\'' + escJs(u._docId) + '\')"><i class="ti ti-pencil"></i></button>' +
      '</div></td>' +
    '</tr>';
  }).join('');

  document.getElementById('cfg-content').innerHTML =
    '<div style="display:flex;justify-content:flex-end;margin-bottom:12px">' +
      '<button class="btn btn-primary btn-sm" onclick="App.nuevoUsuario()"><i class="ti ti-plus"></i> Nuevo usuario</button>' +
    '</div>' +
    '<div class="table-wrap">' +
      '<table>' +
        '<thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Modulos</th><th>Activo</th><th></th></tr></thead>' +
        '<tbody>' + (filas || '<tr><td colspan="6" style="text-align:center;color:var(--tl);padding:20px">Sin usuarios</td></tr>') + '</tbody>' +
      '</table>' +
    '</div>';
}

function nuevoUsuario() { editarUsuario(null); }

function editarUsuario(docId) {
  var u = docId ? (hubData.usuarios || []).find(function(x) { return x._docId === docId; }) : null;
  var asignados = (u && Array.isArray(u.modulos)) ? u.modulos : [];

  // Checkboxes de módulos
  var checks = (hubData.modulos || []).map(function(m) {
    var checked = asignados.indexOf(m.id_modulo) >= 0 ? ' checked' : '';
    return '<label class="mod-check-item">' +
      '<input type="checkbox" class="usr-mod-chk" value="' + esc(m.id_modulo) + '"' + checked + '>' +
      '<span>' + esc(m.nombre) + '</span>' +
      '<span class="mci-id">' + esc(m.id_modulo) + '</span>' +
    '</label>';
  }).join('');

  var form =
    '<div style="padding:16px 0">' +
      '<div class="form-group">' +
        '<label class="form-label">Nombre *</label>' +
        '<input type="text" class="form-input" id="usr-nombre" value="' + esc(u ? u.nombre : '') + '">' +
      '</div>' +
      '<div class="form-group">' +
        '<label class="form-label">Email *</label>' +
        '<input type="email" class="form-input" id="usr-email" value="' + esc(u ? u.email : '') + '" placeholder="nombre@redesconrostro.org"' + (u ? ' readonly style="background:#f8fbfd;color:var(--tm)"' : '') + '>' +
      '</div>' +
      '<div class="form-grid-2">' +
        '<div class="form-group">' +
          '<label class="form-label">Rol</label>' +
          '<select class="form-select" id="usr-rol">' +
            '<option value="Admin"' + (u && u.rol === 'Admin' ? ' selected' : '') + '>Admin</option>' +
            '<option value="Editor"' + (u && u.rol === 'Editor' ? ' selected' : '') + '>Editor</option>' +
            '<option value="Visualizador"' + (u && u.rol === 'Visualizador' ? ' selected' : '') + '>Visualizador</option>' +
          '</select>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Activo</label>' +
          '<select class="form-select" id="usr-activo">' +
            '<option value="true"' + (!u || u.activo !== false ? ' selected' : '') + '>Si</option>' +
            '<option value="false"' + (u && u.activo === false ? ' selected' : '') + '>No</option>' +
          '</select>' +
        '</div>' +
      '</div>' +
      '<div class="form-group">' +
        '<label class="form-label">Modulos asignados</label>' +
        '<div class="mod-check-list">' + (checks || '<span style="font-size:12px;color:var(--tl)">Sin modulos</span>') + '</div>' +
      '</div>' +
      '<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:8px">' +
        '<button class="btn btn-glass" onclick="App.switchCfgTab(\'usuarios\')">Cancelar</button>' +
        '<button class="btn btn-primary" onclick="App.guardarUsuario(\'' + escJs(docId || '') + '\')"><i class="ti ti-check"></i> ' + (u ? 'Actualizar' : 'Guardar') + '</button>' +
      '</div>' +
    '</div>';

  document.getElementById('cfg-content').innerHTML = form;
}

async function guardarUsuario(docId) {
  var nombreEl = document.getElementById('usr-nombre');
  var emailEl  = document.getElementById('usr-email');
  var rolEl    = document.getElementById('usr-rol');
  var activoEl = document.getElementById('usr-activo');
  if (!nombreEl || !emailEl || !rolEl || !activoEl) { showToast('Error en el formulario'); return; }

  var nombre = nombreEl.value.trim();
  var email  = emailEl.value.trim().toLowerCase();
  var rol    = rolEl.value;
  var activo = activoEl.value === 'true';

  var modulos = Array.prototype.slice.call(document.querySelectorAll('.usr-mod-chk'))
    .filter(function(c) { return c.checked; })
    .map(function(c) { return c.value; });

  if (!nombre || !email) { showToast('Nombre y email son obligatorios'); return; }
  if (!email.endsWith('@' + DOMAIN)) { showToast('Solo cuentas @' + DOMAIN); return; }

  try {
    if (docId) {
      // Editar
      await updateDoc(doc(db, 'Usuarios', docId), {
        nombre: nombre, rol: rol, activo: activo, modulos: modulos
      });
      var idx = hubData.usuarios.findIndex(function(x) { return x._docId === docId; });
      if (idx >= 0) {
        hubData.usuarios[idx] = Object.assign({}, hubData.usuarios[idx],
          { nombre: nombre, rol: rol, activo: activo, modulos: modulos });
      }
      // Si me edité a mí mismo, refrescar sesión
      if (session && session._docId === docId) {
        session.nombre = nombre; session.rol = rol; session.modulos = modulos;
        sessionStorage.setItem('rcr_hub_session', JSON.stringify(session));
        iniciarHub();
      }
    } else {
      // Crear (evitar duplicado por email)
      var existe = (hubData.usuarios || []).some(function(x) {
        return (x.email || '').toLowerCase() === email;
      });
      if (existe) { showToast('Ya existe un usuario con ese email'); return; }

      var nuevo = {
        id_usuario: 'USR_' + Date.now(),
        nombre: nombre, email: email, rol: rol, activo: activo, modulos: modulos
      };
      var ref = await addDoc(collection(db, 'Usuarios'), nuevo);
      hubData.usuarios.push(Object.assign({ _docId: ref.id }, nuevo));
    }

    cacheData(hubData);
    showToast(docId ? 'Usuario actualizado' : 'Usuario creado');
    switchCfgTab('usuarios');
  } catch(e) {
    console.error('guardarUsuario:', e);
    showToast('Error al guardar');
  }
}

// ── Pantallas / UI ─────────────────────────────────────────
function mostrarLogin() {
  document.getElementById('screen-login').classList.remove('hidden');
  document.getElementById('screen-loading').classList.add('hidden');
  document.getElementById('screen-hub').classList.add('hidden');
  var btn = document.getElementById('btn-login');
  if (btn) btn.disabled = false;
}
function mostrarLoading() {
  document.getElementById('screen-login').classList.add('hidden');
  document.getElementById('screen-loading').classList.remove('hidden');
  document.getElementById('screen-hub').classList.add('hidden');
}
function mostrarHub() {
  document.getElementById('screen-login').classList.add('hidden');
  document.getElementById('screen-loading').classList.add('hidden');
  document.getElementById('screen-hub').classList.remove('hidden');
}

function showToast(msg, dur) {
  dur = dur || 3500;
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, dur);
}

function abrirModal(html) {
  cerrarModal();
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay';
  overlay.innerHTML = html;
  overlay.addEventListener('click', function(e) { if (e.target === overlay) cerrarModal(); });
  document.body.appendChild(overlay);
}
function cerrarModal() {
  var m = document.getElementById('modal-overlay');
  if (m) m.remove();
}

// ── Exponer al ámbito global (para onclick inline) ─────────
window.iniciarLogin = iniciarLogin;
window.cerrarSesion = cerrarSesion;
window.abrirConfiguracion = abrirConfiguracion;
window.App = {
  abrirModulo: abrirModulo,
  editarModulo: editarModulo,
  guardarModulo: guardarModulo,
  switchCfgTab: switchCfgTab,
  cerrarModal: cerrarModal,
  nuevoUsuario: nuevoUsuario,
  editarUsuario: editarUsuario,
  guardarUsuario: guardarUsuario
};

// ── Punto de entrada: estado de autenticación ──────────────
onAuthStateChanged(auth, async function(user) {
  // Restaurar token de Google guardado en esta sesión de pestaña
  var t = sessionStorage.getItem('rcr_hub_token');
  var exp = sessionStorage.getItem('rcr_hub_exp');
  if (t && exp && Date.now() < parseInt(exp, 10) - TOKEN_MARGIN_MS) {
    googleToken = t;
    tokenExpiry = parseInt(exp, 10);
  }

  if (!user) {
    booted = true;
    mostrarLogin();
    return;
  }

  if (!user.email || !user.email.toLowerCase().endsWith('@' + DOMAIN)) {
    showToast('Solo cuentas @' + DOMAIN);
    await signOut(auth);
    mostrarLogin();
    return;
  }

  mostrarLoading();
  await cargarDatosYEntrar(user);
  booted = true;
});
