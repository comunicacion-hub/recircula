<style>

    --bg:linear-gradient(135deg,#e8f4fd,#eef0ff,#e8faf7);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;border:1px solid var(--border);border-radius:24px;box-shadow:0 8px 40px rgba(0,0,0,.08);width:100%;max-width:560px;padding:40px}
  h1{font-size:22px;font-weight:800;background:linear-gradient(90deg,var(--b1),var(--b2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
  .sub{font-size:13px;color:var(--tl);margin-bottom:28px}
  .btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px 20px;border-radius:12px;border:1.5px solid var(--border);background:#fff;font-family:inherit;font-size:14px;font-weight:600;color:var(--tx);cursor:pointer;transition:.15s;margin-bottom:12px}
  .btn:hover{border-color:var(--b1);background:#f8fbfd}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn-primary{border-color:var(--b1);color:var(--b1)}
  .btn-primary:hover{background:#f0f7ff}
  .user-box{display:none;align-items:center;gap:12px;padding:12px 16px;background:#f4f8fb;border-radius:12px;margin-bottom:20px}
  .user-box.show{display:flex}
  .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--b1),var(--b2));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px}
  .user-name{font-size:13px;font-weight:600}
  .user-mail{font-size:11px;color:var(--tm)}
  .rows{margin-top:8px}
  .row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;font-size:13px}
  .row-name{font-weight:600}
  .row-count{color:var(--tl);font-size:12px}
  .row-status{font-size:12px;font-weight:600}
  .st-wait{color:var(--tl)} .st-run{color:var(--b1)} .st-ok{color:#0a9e83} .st-err{color:#c91a44}
  .note{font-size:11.5px;color:var(--tm);line-height:1.6;margin-top:18px;padding:12px 14px;background:#fff8e4;border-radius:10px}
  .log{margin-top:16px;font-size:11px;color:var(--tm);font-family:monospace;max-height:120px;overflow-y:auto;white-space:pre-wrap;display:none}
  .log.show{display:block}
</style>
</head>

<div class="card">

const ORDEN = ["Asoc_Ambiente","Compradores","Materiales","Entregas","Configuracion"];

// Pintar filas de estado
const rowsEl = document.getElementById("rows");
rowsEl.innerHTML = ORDEN.map(c => `
  <div class="row">
    <div><div class="row-name">${c}</div></div>
    <div style="text-align:right">
      <div class="row-count">${(DATA[c]||[]).length} registros</div>
      <div class="row-status st-wait" id="st-${c}">En espera</div>
    </div>
  </div>`).join("");

const logEl = document.getElementById("log");
function log(msg){ logEl.classList.add("show"); logEl.textContent += msg + "\n"; logEl.scrollTop = logEl.scrollHeight; }
function setStatus(c, txt, cls){ const e=document.getElementById("st-"+c); e.textContent=txt; e.className="row-status "+cls; }

let user = null;

document.getElementById("btnLogin").onclick = async () => {
  try {
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ hd: DOMAIN });
    const res = await signInWithPopup(auth, provider);
    if (!res.user.email.endsWith("@"+DOMAIN)) {
      alert("Solo cuentas @"+DOMAIN);
      await signOut(auth); return;
    }
    user = res.user;
    document.getElementById("userBox").classList.add("show");
    document.getElementById("userName").textContent = user.displayName || "Usuario";
    document.getElementById("userMail").textContent = user.email;
    document.getElementById("avatar").textContent =
      (user.displayName||"?").split(" ").slice(0,2).map(w=>w[0]||"").join("").toUpperCase();
    document.getElementById("btnLogin").disabled = true;
    document.getElementById("btnImport").disabled = false;
  } catch(e) {
    console.error(e);
    alert("Error al iniciar sesión: " + e.message);
  }
};

document.getElementById("btnImport").onclick = async () => {
  document.getElementById("btnImport").disabled = true;
  for (const col of ORDEN) {
    const items = DATA[col] || [];
    if (!items.length) { setStatus(col,"Sin datos","st-wait"); continue; }
    setStatus(col, "Importando...", "st-run");
    try {
      // writeBatch (cada colección está bajo el límite de 500)
      const batch = writeBatch(db);
      items.forEach(item => {
        const ref = doc(collection(db, col)); // ID autogenerado
        batch.set(ref, item);
      });
      await batch.commit();
      setStatus(col, "✓ "+items.length+" listos", "st-ok");
      log("✅ "+col+": "+items.length+" documentos");
    } catch(e) {
      setStatus(col, "✗ Error", "st-err");
      log("❌ "+col+": "+e.message);
      console.error(col, e);
    }
  }
  log("\n— Proceso terminado —");
};
